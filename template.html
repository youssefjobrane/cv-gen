<!DOCTYPE html>

    <title>CV Youssef Jobrane</title>
    <script>
        // Language detection and redirection
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('lang')) {
                const userLang = navigator.language || navigator.userLanguage;
                const supportedLangs = ['fr', 'en'];
                const defaultLang = 'fr';
                const detectedLang = supportedLangs.find(lang => userLang.startsWith(lang)) || defaultLang;

                // Only update URL if not already in the correct language
                if (detectedLang !== defaultLang) {
                    const newUrl = `${window.location.pathname}?lang=${detectedLang}`;
                    window.location.href = newUrl;
                }
            }
        });
    </script>

    <style>

        .view-pdf-btn {

        body.preview-mode .no-print {

    </style>

<body>

    <script>
        // Current language state with URL parameter support
        const urlParams = new URLSearchParams(window.location.search);
        let currentLanguage = urlParams.get('lang') || 'fr';

        // Function to update URL with current language
        function updateUrlWithLanguage(lang) {
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.pushState({}, '', url);
        }

        // Function to load JSON data based on language
        async function loadCVData(lang = 'fr') {
            try {
                const filename = lang === 'en' ? 'cv-data-en.json' : 'cv-data-fr.json';
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error('Failed to load CV data');
                }
                const data = await response.json();
                window.cvData = data; // Store the loaded data
                return data;
            } catch (error) {
                console.error('Error loading CV data:', error);
                // Fallback to French if English fails
                if (lang === 'en') {
                    console.log('Falling back to French version');
                    return loadCVData('fr');
                }
                return null;
            }
        }

        // Function to render the CV
        async function renderCV(lang = currentLanguage) {
            // Update current language and URL
            currentLanguage = lang;
            updateUrlWithLanguage(lang);
            
            // Update HTML lang attribute
            document.documentElement.lang = lang;
            
            // Update active state of language buttons
            document.querySelectorAll('.language-btn').forEach(btn => {
                const btnLang = btn.getAttribute('data-lang');
                if (btnLang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            let data;
            if (window.cvData) {
                // Use the loaded JSON data if available
                data = window.cvData;
            } else {
                // Otherwise, load from the default JSON files
                data = await loadCVData(lang);
                if (!data) {
                    console.error('No data available');
                    return;
                }
            }

            // Update profile image
            const profileImage = document.getElementById('profile-image');
            if (profileImage && data.personalInfo?.photo) {
                profileImage.innerHTML = `<img src="${data.personalInfo.photo}" alt="${data.personalInfo.name || 'Profile'}" class="profile-img">`;
            }

            // Update header info
            const header = document.querySelector('header');
            if (header && data.personalInfo) {
                const title = header.querySelector('h1');
                const subtitle = header.querySelector('.header-subtitle');
                const info = header.querySelector('.header-info');

                if (title) title.textContent = data.personalInfo.name || '';
                if (subtitle && data.personalInfo.title) {
                    subtitle.textContent = data.personalInfo.title;
                }
                if (info) {
                    info.innerHTML = `
                        <i class="fas fa-map-marker-alt"></i> ${data.personalInfo.location || 'Tunis, Tunisia'}
                        ${data.personalInfo.phone ? `&nbsp;&nbsp;<i class="fas fa-phone"></i> ${data.personalInfo.phone}` : ''}
                    `;
                }
            }

            // Update section titles from JSON
            if (data.sectionTitles) {
                // Update all section titles
                const sections = document.querySelectorAll('[data-section]');
                sections.forEach(section => {
                    const sectionId = section.getAttribute('data-section');
                    if (data.sectionTitles[sectionId]) {
                        section.textContent = data.sectionTitles[sectionId];
                    }
                });
            }

            // Update contact info
            const contactContent = document.querySelector('.contact-content');
            if (contactContent && data.personalInfo) {
                contactContent.innerHTML = `
                    ${data.personalInfo.location || ''}<br>
                    <a href="tel:${data.personalInfo.phone || ''}">
                        <i class="fas fa-phone"></i> ${data.personalInfo.phone || ''}
                    </a>
                    <a href="${data.personalInfo.linkedin || ''}" target="_blank">
                        <i class="fab fa-linkedin"></i> LinkedIn
                    </a>
                    <a href="mailto:${data.personalInfo.email || ''}">
                        <i class="fas fa-envelope"></i> Gmail
                    </a>

                `;
            }

            // Update profile
            const profileText = document.querySelector('.profile-text');
            if (profileText && data.profile) {
                profileText.innerHTML = `
                    <div style="position: relative; padding-left: 20px; margin-bottom: 15px;">
                        <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--timeline-line);"></div>
                        ${data.profile}
                    </div>
                `;
            }

            // Update skills
            const skillsContent = document.querySelector('.skills-content');
            if (skillsContent && data.skills) {
                const tagStyle = [
                    'display:inline-block',
                    'margin:2px 3px',
                    'padding:3px 10px',
                    'background:#f7f7f7',
                    'border:1px solid #e2e2e2',
                    'border-radius:20px',
                    'font-size:11px',
                    'color:#333',
                    'white-space:nowrap',
                    'letter-spacing:0.01em',
                    'line-height:1.5'
                ].join(';');

                const dividerLine = `<div style="flex:1;height:1px;background:#d8d8d8;"></div>`;

                const renderCategory = (category, items) => `
                    <div style="margin-bottom:11px;width:100%;">
                        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
                            ${dividerLine}
                            <span style="
                                font-size:9.5px;
                                font-weight:700;
                                text-transform:uppercase;
                                letter-spacing:0.12em;
                                color:#555;
                                white-space:nowrap;
                            ">${category}</span>
                            ${dividerLine}
                        </div>
                        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:0;">
                            ${items.map(s => `<span style="${tagStyle}">${s}</span>`).join('')}
                        </div>
                    </div>`;

                let skillsHTML = '';
                if (Array.isArray(data.skills)) {
                    skillsHTML = `<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:0;">
                        ${data.skills.map(s => `<span style="${tagStyle}">${s}</span>`).join('')}
                    </div>`;
                } else {
                    skillsHTML = `<div style="width:100%;">` +
                        Object.entries(data.skills).map(([cat, items]) => renderCategory(cat, items)).join('') +
                    `</div>`;
                }
                skillsContent.innerHTML = skillsHTML;
            }

            // Update languages
            const languagesContent = document.querySelector('.languages-content');
            if (languagesContent && data.languages) {
                languagesContent.innerHTML = data.languages.map(lang =>
                    `${lang.name} - ${lang.level || ''}`
                ).join('<br>');
            }

            // Update experience with timeline
            const experienceContainer = document.querySelector('.experience-container');
            if (experienceContainer && data.experience) {
                const sectionTitles = data.sectionTitles;

                experienceContainer.innerHTML = `
                    <div class="timeline-section">
                        ${data.experience.map(exp => `
                            <div class="timeline-item">
                                <div class="timeline-content">
                                    <div class="timeline-period">${exp.period || ''}</div>
                                    <div class="timeline-title">${exp.position || ''}</div>
                                    <div class="timeline-subtitle">${exp.company || ''}${exp.location ? ', ' + exp.location : ''}</div>
                                    ${exp.projects ? exp.projects.map(project => `
                                        <div class="project" style="margin-top: 15px;">
                                            <div style="font-weight: 600; font-size: 13px; margin: 10px 0 5px 0;">${project.name || ''}</div>
                                          ${project.period ? `<div class="project-period" style="font-size: 11px; color: var(--light-gray); margin-bottom: 5px;">${project.period}</div>` : ''}
                                                ${project.team ? `
                                                    <div class="project-team" style="font-size: 11px; margin-top: 10px; color: var(--light-gray);">
                                                        <strong style="color: var(--primary-black);">${sectionTitles?.team || 'Team'}:</strong>
                                                        ${project.team}
                                                    </div>
                                                ` : ''}
                                                ${project.methodology ? `
                                                    <div class="project-methodology" style="font-size: 11px; margin-top: 10px; color: var(--light-gray);">
                                                        <strong style="color: var(--primary-black);">${sectionTitles?.methodology || 'Methodology'}:</strong>
                                                        ${project.methodology}
                                                    </div>
                                                ` : ''}
                                            ${project.description ? `<p class="project-description" style="font-size: 12px; line-height: 1.5; margin: 8px 0;">${project.description}</p>` : ''}
                                            ${project.responsibilities && project.responsibilities.length > 0 ? `
                                                <ul class="tasks-list" style="padding-left: 18px; margin: 8px 0; font-size: 12px;">
                                                    ${project.responsibilities.map(resp =>
                                                        `<li style="margin-bottom: 5px; line-height: 1.4;">${resp}</li>`
                                                    ).join('')}
                                                </ul>
                                            ` : ''}
                                            ${project.technologies && project.technologies.length > 0 ? `
                                                <div class="tech-stack" style="font-size: 11px; margin-top: 10px; color: var(--light-gray);">
                                                    <strong style="color: var(--primary-black);">${sectionTitles?.technologies || 'Technologies'}:</strong>
                                                    ${project.technologies.join(', ')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `).join('') : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            }

            // Update education with timeline
            const educationContainer = document.querySelector('.education-container');
            if (educationContainer && data.education) {
                educationContainer.innerHTML = `
                    <div class="timeline-section">
                        ${data.education.map(edu => `
                            <div class="timeline-item">
                                <div class="timeline-content" style="padding: 8px 12px 8px 12px;">
                                    <div class="timeline-title" style="font-size: 13px; margin: 0 0 2px 0; line-height: 1.2;">${edu.degree || ''}</div>
                                    <div class="timeline-subtitle" style="font-size: 11px; margin: 0 0 2px 0; color: #666; line-height: 1.2;">${edu.institution || ''}${edu.location ? ', ' + edu.location : ''}</div>
                                    <div class="timeline-period" style="font-size: 10px; color: #999; line-height: 1.2;">${edu.period || ''}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            }

            // Update soft skills
            const softSkillsContent = document.querySelector('.soft-skills-content');
            if (softSkillsContent && data.softSkills) {
                softSkillsContent.innerHTML = data.softSkills.map(skill =>
                    `<span class="soft-skill-tag">${skill}</span>`
                ).join('');
            }
        }

        // Function to handle file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    // Update the CV with the loaded data
                    if (window.cvData) {
                        window.cvData = { ...window.cvData, ...jsonData };
                    } else {
                        window.cvData = jsonData;
                    }
                    
                    // Update the load button to show filename
                    const loadButton = document.getElementById('load-json-button');
                    if (loadButton) {
                        const maxLength = 20;
                        let displayName = file.name;
                        if (file.name.length > maxLength) {
                            const start = file.name.substring(0, 10);
                            const end = file.name.substring(file.name.length - 7);
                            displayName = `${start}...${end}`;
                        }
                        loadButton.textContent = `Loaded: ${displayName}`;
                        loadButton.title = `Loaded file: ${file.name}\nClick to load a different file`;
                        loadButton.style.backgroundColor = '#28a745';
                    }
                    
                    // Show reset button if present (default mode)
                    const resetButton = document.getElementById('reset-cv-button');
                    if (resetButton) resetButton.style.display = 'inline-block';

                    renderCV(currentLanguage);
                } catch (error) {
                    console.error('Error parsing JSON file:', error);
                    alert('Error: The selected file is not a valid JSON file.');
                }
            };
            reader.readAsText(file);
        }

        // Add file input to the page
        function addFileUploadButton() {
            // Create toolbar container
            const toolbar = document.createElement('div');
            toolbar.id = 'cv-toolbar';
            toolbar.style.position = 'fixed';
            toolbar.style.top = '20px';
            toolbar.style.left = '20px';
            toolbar.style.display = 'flex';
            toolbar.style.gap = '10px';
            toolbar.style.zIndex = '1000';
            
            // Create file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            fileInput.style.display = 'none';
            fileInput.addEventListener('change', handleFileUpload);
            
            // Create load button
            const uploadButton = document.createElement('button');
            uploadButton.id = 'load-json-button';
            uploadButton.textContent = 'Load JSON CV';
            uploadButton.style.padding = '8px 16px';
            uploadButton.style.backgroundColor = '#007bff';
            uploadButton.style.color = 'white';
            uploadButton.style.border = 'none';
            uploadButton.style.borderRadius = '4px';
            uploadButton.style.cursor = 'pointer';
            uploadButton.style.fontSize = '14px';
            uploadButton.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';
            uploadButton.style.transition = 'all 0.2s';
            uploadButton.title = 'Click to load a JSON CV file';
            uploadButton.onmouseover = () => {
                uploadButton.style.opacity = '0.9';
                uploadButton.style.transform = 'translateY(-1px)';
            };
            uploadButton.onmouseout = () => {
                uploadButton.style.opacity = '1';
                uploadButton.style.transform = 'translateY(0)';
            };
            uploadButton.onclick = (e) => {
                e.preventDefault();
                fileInput.click();
            };
            
            // Create reset button (initially hidden)
            const resetButton = document.createElement('button');
            resetButton.id = 'reset-cv-button';
            resetButton.textContent = 'Reset CV';
            resetButton.style.padding = '8px 16px';
            resetButton.style.backgroundColor = '#dc3545';
            resetButton.style.color = 'white';
            resetButton.style.border = 'none';
            resetButton.style.borderRadius = '4px';
            resetButton.style.cursor = 'pointer';
            resetButton.style.fontSize = '14px';
            resetButton.style.boxShadow = '0 2px 5px rgba(0,0,0,0.2)';
            resetButton.style.transition = 'all 0.2s';
            resetButton.style.display = 'none'; // Initially hidden
            resetButton.title = 'Reset to default CV';
            resetButton.onmouseover = () => {
                resetButton.style.opacity = '0.9';
                resetButton.style.transform = 'translateY(-1px)';
            };
            resetButton.onmouseout = () => {
                resetButton.style.opacity = '1';
                resetButton.style.transform = 'translateY(0)';
            };
            resetButton.onclick = (e) => {
                e.preventDefault();
                // Show language switcher before reloading
                const languageSwitcher = document.querySelector('.language-switcher');
                if (languageSwitcher) {
                    languageSwitcher.style.display = 'flex';
                }
                window.location.reload();
            };
            
            // Add elements to toolbar
            toolbar.appendChild(uploadButton);
            toolbar.appendChild(resetButton);
            
            // Add to document
            document.body.appendChild(fileInput);
            document.body.appendChild(toolbar);
        }

        // Handle preview updates from the live editor (iframe postMessage)
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'updatePreview') {
                document.body.classList.add('preview-mode');
                if (event.data.lang) {
                    currentLanguage = event.data.lang;
                    document.documentElement.lang = currentLanguage;
                }
                if (event.data.data) {
                    window.cvData = event.data.data;
                    renderCV(currentLanguage);
                }
            }
        });

        // Detect modes from URL params
        const isViewMode   = urlParams.has('lang') && !urlParams.has('upload');
        const isUploadMode = urlParams.get('upload') === 'true';

        // Shared helper: add a floating PDF button
        function addPdfButton() {
            const pdfBtn = document.createElement('button');
            pdfBtn.className = 'view-pdf-btn';
            pdfBtn.innerHTML = '<i class="fas fa-file-pdf"></i> Générer PDF';
            pdfBtn.onclick = () => window.print();
            document.body.appendChild(pdfBtn);
        }

        // Initialize the CV when the page loads
        document.addEventListener('DOMContentLoaded', () => {

            if (isViewMode) {
                // View mode: CV + PDF button only — no toolbar, no language switcher
                document.body.classList.add('view-mode');
                addPdfButton();

            } else if (isUploadMode) {
                // Upload mode: Load JSON toolbar + PDF button — no language switcher
                document.body.classList.add('upload-mode');
                addFileUploadButton();
                addPdfButton();
                // Auto-open file picker immediately
                setTimeout(() => {
                    const fileInput = document.querySelector('input[type="file"][accept=".json"]');
                    if (fileInput) fileInput.click();
                }, 300);

            } else {
                // Default mode: toolbar + language switcher
                addFileUploadButton();

                const languageSwitcher = document.createElement('div');
                languageSwitcher.className = 'language-switcher';
                languageSwitcher.innerHTML = `
                    <button onclick="renderCV('fr')" data-lang="fr" class="language-btn">
                        <span class="flag-icon flag-icon-fr"></span> FR
                    </button>
                    <button onclick="renderCV('en')" data-lang="en" class="language-btn">
                        <span class="flag-icon flag-icon-gb"></span> EN
                    </button>
                `;
                document.body.insertBefore(languageSwitcher, document.body.firstChild);

                window.addEventListener('popstate', () => {
                    const p = new URLSearchParams(window.location.search);
                    const newLang = p.get('lang') || 'fr';
                    if (newLang !== currentLanguage) renderCV(newLang);
                });
            }

            renderCV(currentLanguage);
        });
    </script>

    <div class="no-print">
        <button class="btn-generate btn-pdf" onclick="window.print()">Générer PDF</button>
<!--
        <button class="btn-generate" onclick="location.reload()" style="margin-left: 10px;">Rafraîchir</button>
-->
    </div>

    <div class="cv-container">
        <header>
            <div id="profile-image"></div>
            <h1>${data.personalInfo?.name || ''}</h1>
            <div class="header-subtitle">DÉVELOPPEUR FULL STACK ANGULAR | JAVA</div>
            <div class="header-info">
                <i class="fas fa-map-marker-alt"></i> ${data.personalInfo?.location || 'Tunis, Tunisia'}
                ${data.personalInfo?.phone ? `<i class="fas fa-phone"></i> ${data.personalInfo.phone}` : ''}
            </div>
        </header>

        <div class="cv-grid">

                <div class="sidebar-section">

                <div class="sidebar-section">

            <main class="main-content">
                <div class="section">
